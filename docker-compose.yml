services:
  web:
    image: thekampany/trippanion_web:latest
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    expose:
      - 8000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    container_name: trippanion_web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  qcluster:
    image: thekampany/trippanion_web:latest
    entrypoint: []
    container_name: trippanion_qcluster
    command: python manage.py qcluster
    init: true
    restart: unless-stopped
    env_file:
     - .env
    volumes:
     - media_volume:/usr/src/app/media
    depends_on:
      web:
        condition: service_healthy

  nginx:
    image: thekampany/trippanion_nginx:latest
    container_name: trippanion_nginx
    ports:
      - "8043:8043"
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    depends_on:
      - web
    restart: unless-stopped

  db:
    image: postgres:13
    container_name: trippanion_db
    volumes:
      - tripapp_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: tripappdb
      POSTGRES_USER: tripappuser
      POSTGRES_PASSWORD: tripapppassword
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripappuser -d tripappdb"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  static_volume:
  media_volume:
  tripapp_postgres_data:
