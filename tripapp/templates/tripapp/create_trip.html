{% load static %}
{% load crispy_forms_tags %}
{% load i18n %}
<!DOCTYPE html>
<html>
<head>
    <title>Create Trip</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/main.css' %}" type="text/css">
    <link href="{% static 'django_select2/css/select2.min.css' %}" rel="stylesheet" />
    <script src="{% static 'django_select2/js/select2.full.min.js' %}"></script>
</head>
<body>
<div class="card">
<div class="container">


    <h2>Create a New Trip</h2>
    <p>&nbsp;</p>
    <form method="post" id="create-trip-form">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn">Create Trip</button>
    </form>

</div>
</div>

</body>
</html>
