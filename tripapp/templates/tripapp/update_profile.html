{% extends "base_generic.html" %}
{% load crispy_forms_tags %}
{% block content %}

    <h1>Update Profile</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form|crispy }}
        <p>&nbsp;</p>
        <button type="submit" class="btn">Save Changes</button>
        <p>&nbsp;</p>
    </form>
{% endblock %}
