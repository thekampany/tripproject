{% extends "base_generic.html" %}
{% load i18n %}
{% load crispy_forms_tags %}
{% block content %}
<h2>Invite to Tribe</h2>
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <label for="tribe">Tribe:</label>
    <select id="tribe" name="tribe_id">
        {% for tribe in tribes %}
            <option value="{{ tribe.id }}">{{ tribe.name }}</option>
        {% endfor %}
    </select>

    <hr>
    <h3>Invite via Email</h3>
    <input type="hidden" name="invite_type" value="email" id="invite_type_email">
    <label for="email">Email:</label>
    <div id="email-rows">
    <div class="email-row">
        <input type="email" name="emails" class="email-input" placeholder="{% trans 'name@example.com' %}">
        <button type="button" class="remove-row" style="display:none;">&times;</button>
    </div>
    </div>

    <button type="button" id="add-row" class="btn-secondary">
    {% trans "+ Add Person" %}
    </button>
    <button type="submit" class="btn" onclick="document.getElementById('invite_type_email').value='email'">
        Send Email Invite
    </button>

    <hr>
    <h3>Invite via Code</h3>
    <button type="submit" class="btn" onclick="document.getElementById('invite_type_email').value='code'">
        Generate Invite Code / QR-code
    </button>
</form>
<p>&nbsp;</p>
{% endblock %}

{% block extra_css %}
<style>
.email-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}
.email-input {
  flex: 1;
  padding: 0.4rem 0.6rem;
  border: 1px solid #ccc;
  border-radius: 4px;
}
.email-input.valid {
  border-color: #4caf50;
}
.email-input.invalid {
  border-color: #e53935;
  background: #fff5f5;
}
.remove-row {
  background: none;
  border: none;
  color: #e53935;
  font-size: 1.2rem;
  cursor: pointer;
  line-height: 1;
}
.btn-secondary {
  margin-top: 0.25rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  padding: 0.3rem 0.7rem;
  cursor: pointer;
}
</style>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  const rowsContainer = document.getElementById('email-rows');
  const addBtn = document.getElementById('add-row');

  function validateInput(input) {
    const value = input.value.trim();
    input.classList.remove('valid', 'invalid');
    if (!value) return;
    const isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    input.classList.add(isValid ? 'valid' : 'invalid');
  }

  function updateRemoveButtons() {
    const rows = rowsContainer.querySelectorAll('.email-row');
    rows.forEach(row => {
      row.querySelector('.remove-row').style.display = rows.length > 1 ? 'inline-block' : 'none';
    });
  }

  function addRow() {
    const row = document.createElement('div');
    row.className = 'email-row';
    row.innerHTML = `
      <input type="email" name="emails" class="email-input" placeholder="naam@voorbeeld.com">
      <button type="button" class="remove-row">&times;</button>
    `;
    rowsContainer.appendChild(row);
    updateRemoveButtons();
    row.querySelector('.email-input').focus();
  }

  rowsContainer.addEventListener('input', function (e) {
    if (e.target.classList.contains('email-input')) {
      validateInput(e.target);
    }
  });

  rowsContainer.addEventListener('click', function (e) {
    if (e.target.classList.contains('remove-row')) {
      e.target.closest('.email-row').remove();
      updateRemoveButtons();
    }
  });

  addBtn.addEventListener('click', addRow);

  // Bij Enter in een veld: nieuwe rij toevoegen i.p.v. form submitten
  rowsContainer.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.target.classList.contains('email-input')) {
      e.preventDefault();
      addRow();
    }
  });

  updateRemoveButtons();
});
</script>
{% endblock %}
