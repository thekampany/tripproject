{% extends "base_generic.html" %}
{% load i18n %}
{% load crispy_forms_tags %}
{% block extra_css %}
<style>
#address-section {
    position: relative;
    margin-bottom: 1rem;
}
#address-results {
    border: 1px solid #ccc;
    max-height: 200px;
    overflow-y: auto;
    background: white;
    color: black;
    position: absolute;
    z-index: 1000;
    width: 100%;
    display: none;
}
#address-results div {
    padding: 5px;
    cursor: pointer;
}
#address-results div:hover {
    background: #f0f0f0;
}
.address-field {
    position: relative;
}
</style>
{% endblock %}
{% block content %}
    <h2>Add Point</h2><br>
    <b> for Trip {{ trip.name }}</b>
    <br><br>

    {% crispy form %}

{% endblock %}
{% block extra_js %}
{{ block.super }}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const addressField = document.getElementById('id_address');
    const latitudeField = document.getElementById('id_latitude');
    const longitudeField = document.getElementById('id_longitude');
    const resultsContainer = document.createElement('div');
    resultsContainer.id = 'address-results';
    addressField.parentNode.style.position = 'relative';
    addressField.parentNode.appendChild(resultsContainer);


    const toggleAddress = document.getElementById('toggle-address');
    const addressFieldWrapper = addressField.closest('div');

    toggleAddress.addEventListener('change', function(e) {
        addressFieldWrapper.style.display = e.target.checked ? 'block' : 'none';
    });

    function searchAddress() {
        if (addressField.value.length > 3) {
            fetch(`/address-search/?q=${encodeURIComponent(addressField.value)}`)
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                if (data.length > 0) {
                    resultsContainer.innerHTML = '';
                    if (data.length === 1) {
                        latitudeField.value = data[0].lat;
                        longitudeField.value = data[0].lon;
                        resultsContainer.style.display = 'none';
                    } else {
                        data.forEach(item => {
                            const option = document.createElement('div');
                            option.textContent = item.display_name;
                            option.style.cssText = 'padding:5px;cursor:pointer;background:white;color:black;';
                            option.addEventListener('click', function() {
                                latitudeField.value = item.lat;
                                longitudeField.value = item.lon;
                                resultsContainer.style.display = 'none';
                            });
                            resultsContainer.appendChild(option);
                        });
                        resultsContainer.style.cssText = 'display:block;position:absolute;z-index:1000;width:100%;border:1px solid #ccc;max-height:200px;overflow-y:auto;background:white;';
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                resultsContainer.style.display = 'none';
            });
        } else {
            resultsContainer.style.display = 'none';
        }
    }

    addressField.addEventListener('input', searchAddress);
    addressField.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            searchAddress();
        }
    });
});
</script>
{% endblock %}
